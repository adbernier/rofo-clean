<!DOCTYPE html>
<html>
<head>
  <title>Rofo | Commercial Real Estate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f5;
      color: #222;
    }

    .topbar {
      background: white;
      border-bottom: 1px solid #e5e5e0;
    }

    .topbar-inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      color: #1d3557;
      text-decoration: none;
    }

    .nav a {
      margin-left: 18px;
      color: #444;
      text-decoration: none;
      font-size: 14px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .hero {
      background: white;
      border: 1px solid #e5e5e0;
      border-radius: 12px;
      padding: 36px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 34px;
    }

    .subhead {
      color: #666;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .button {
      background: #1d3557;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      border: 1px solid #e5e5e0;
      border-radius: 12px;
      padding: 24px;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
    }

    ul {
      padding-left: 18px;
    }

    form input,
    form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    form button {
      background: #1d3557;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/">Rofo</a>
    <div class="nav">
      <a href="/">Home</a>
    </div>
  </div>
</div>

<div class="container">

  <div class="hero">
    <h1>Find commercial space for your business</h1>
    <div class="subhead">
      Rofo helps businesses find office, retail, and industrial space across major U.S. markets.
    </div>
    <a class="button" href="#contact">Tell us what you need</a>
  </div>

  <div class="grid">

    <div class="card">
      <h2>Browse Markets</h2>
      <ul>
        <li><a href="/commercial-real-estate/CA/San-Francisco/">San Francisco</a></li>
        <li><a href="/commercial-real-estate/TX/Austin/">Austin</a></li>
        <li><a href="/commercial-real-estate/CO/Denver/">Denver</a></li>
      </ul>
    </div>

    <div class="card" id="contact">
      <h2>Tell us what you need</h2>
      <form>
        <input placeholder="Your email">
        <textarea placeholder="What are you looking for?"></textarea>
        <button>Submit</button>
      </form>
    </div>

  </div>

</div>

</body>
</html>
