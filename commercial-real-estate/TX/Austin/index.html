<!DOCTYPE html>
<html>
<head>
  <title>Commercial Real Estate in Austin, TX | Rofo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f5;
      color: #222;
    }

    .topbar {
      background: white;
      border-bottom: 1px solid #e5e5e0;
    }

    .topbar-inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      color: #1d3557;
      text-decoration: none;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .breadcrumb {
      font-size: 13px;
      margin-bottom: 18px;
      color: #666;
    }

    .hero {
      background: white;
      border: 1px solid #e5e5e0;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      border: 1px solid #e5e5e0;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    form input,
    form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    form textarea {
      min-height: 120px;
      resize: vertical;
    }

    form button {
      background: #1d3557;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/">Rofo</a>
  </div>
</div>

<div class="container">

  <div class="breadcrumb">
    <a href="/">Home</a> / Austin
  </div>

  <div class="hero">
    <h1>Commercial Real Estate in Austin, TX</h1>
  </div>

  <div class="grid">

    <div>
      <div class="card">
        <h2>Featured Buildings</h2>
        <p>No featured buildings yet.</p>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Need help finding space?</h2>
        <form>
          <input placeholder="Your email">
          <textarea placeholder="What are you looking for?"></textarea>
          <button>Submit</button>
        </form>
      </div>
    </div>

  </div>

</div>

</body>
</html>
